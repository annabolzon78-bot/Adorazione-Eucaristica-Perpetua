# ── DEVELOPMENT ───────────────────────────────
version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: adorazione_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-adorazione}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-adorazione_viva}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-adorazione}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: adorazione_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-adorazione}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-adorazione_viva}
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_prod}
      CORS_ORIGIN: http://localhost:5173
    ports:
      - '4000:4000'
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: adorazione_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
